version: '3.8'

networks:
  poa-network:
    external: true

services:
  validator1:
    image: ethereum/client-go:v1.13.15
    container_name: geth-validator1
    hostname: validator1
    networks:
      poa-network:
        ipv4_address: 172.20.0.11
    volumes:
      - /home/chaimaa/iot-docker-project/nodes/validator1:/root/.ethereum
    environment:
      - GETH_NODEKEY_HEX_FILE=/root/.ethereum/geth/nodekey
    command:
      - --datadir=/root/.ethereum
      - --networkid=2026
      - --port=30301
      - --http
      - --http.port=8541
      - --http.addr=0.0.0.0
      - --http.api=eth,web3,net,admin,personal,miner,clique
      - --http.corsdomain=*
      - --authrpc.port=8551
      - --mine
      - --miner.etherbase=0xaf0c6BF76f11760b7BA90A852aAeAdFe50aB9277
      - --unlock=0xaf0c6BF76f11760b7BA90A852aAeAdFe50aB9277
      - --password=/root/.ethereum/password.txt
      - --allow-insecure-unlock
      - --syncmode=full
      - --snapshot=false
      - --netrestrict=172.20.0.0/16
      - --nodiscover
      - --verbosity=4
    ports:
      - "8541:8541"
      - "8551:8551"
      - "30301:30301/tcp"
      - "30301:30301/udp"
    restart: unless-stopped

