version: '3.8'

networks:
  poa-network:
    external: true

services:
  # ============================================
  # SERVICE IA - DÉTECTION D'ANOMALIES ML
  # ============================================
  ml-analyzer:
    build:
      context: .
      dockerfile: ml-analyzer/Dockerfile
    container_name: iot-ml-analyzer
    hostname: ml-analyzer
    networks:
      poa-network:
        ipv4_address: 172.20.0.100
    ports:
      - "5001:5000"
    volumes:
      - ./ml-analyzer/models:/app/models
      - ./ml-analyzer/logs:/app/logs
    environment:
      - MODEL_PATH=/app/models
      - LOG_LEVEL=INFO
      - THRESHOLD_MULTIPLIER=1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ============================================
  # MONITORING IA POUR NŒUDS GETH
  # ============================================
  ml-monitor:
    build:
      context: .
      dockerfile: ml-monitor/Dockerfile
    container_name: iot-ml-monitor
    hostname: ml-monitor
    networks:
      poa-network:
        ipv4_address: 172.20.0.101
    volumes:
      - ./ml-monitor/logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # Pour accéder aux stats des conteneurs
    environment:
      - ML_ANALYZER_URL=http://ml-analyzer:5000
      - GETH_NODES=validator1:8541,validator2:8542,validator3:8543,validator4:8544,fullnode1:8545,fullnode2:8546,fullnode3:8547,fullnode4:8548
      - POLL_INTERVAL=10
      - ANOMALY_THRESHOLD=0.7
      - ALERT_WEBHOOK=http://iot-backend:5000/api/alerts/ml
    depends_on:
      - ml-analyzer
      - validator1
      - validator2
      - validator3
      - validator4
    restart: unless-stopped

  # ============================================
  # VALIDATEURS POA
  # ============================================
  validator1:
    image: ethereum/client-go:v1.13.15
    container_name: geth-validator1
    hostname: validator1
    networks:
      poa-network:
        ipv4_address: 172.20.0.11
    volumes:
      - /home/chaimaa/iot-docker-project/nodes/validator1:/root/.ethereum
    environment:
      - GETH_NODEKEY_HEX_FILE=/root/.ethereum/geth/nodekey
    command:
      - --datadir=/root/.ethereum
      - --networkid=2026
      - --port=30301
      - --http
      - --http.port=8541
      - --http.addr=0.0.0.0
      - --http.api=eth,web3,net,admin,personal,miner,clique,txpool,debug
      - --http.corsdomain=*
      - --authrpc.port=8551
      - --authrpc.addr=0.0.0.0
      - --authrpc.vhosts=*
      - --ws
      - --ws.port=8546
      - --ws.addr=0.0.0.0
      - --ws.api=eth,web3,net
      - --ws.origins=*
      - --mine
      - --miner.etherbase=0xaf0c6BF76f11760b7BA90A852aAeAdFe50aB9277
      - --unlock=0xaf0c6BF76f11760b7BA90A852aAeAdFe50aB9277
      - --password=/root/.ethereum/password.txt
      - --allow-insecure-unlock
      - --syncmode=full
      - --snapshot=false
      - --netrestrict=172.20.0.0/16
      - --nodiscover
      - --verbosity=4
      - --metrics
      - --metrics.addr=0.0.0.0
      - --metrics.port=6060
    ports:
      - "8541:8541"
      - "8551:8551"
      - "30301:30301/tcp"
      - "30301:30301/udp"
      - "6061:6060"  # Métriques Prometheus pour ML
    labels:
      - "ml.monitoring.enabled=true"
      - "ml.node.type=validator"
      - "ml.node.priority=high"
    restart: unless-stopped

